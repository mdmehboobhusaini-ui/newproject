name: Update Result Data

on:
  # Run daily at 5:00 PM UTC (10:30 PM IST)
  schedule:
    - cron: '0 17 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest data from Google Sheet
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          OUTPUT_DIR: ./data
        run: |
          python scripts/fetch_data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "📊 Auto-update results data - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
